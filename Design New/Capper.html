<!doctype html>
<html lang="uk">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Capper — ML Football Betting</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Fira+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&family=Calistoga&display=swap" rel="stylesheet"/>
  <style>
/* Capper design tokens */
:root {
  --bg: #020203;
  --surface: #0a0a0c;
  --raised: #111114;
  --indigo: #5E6AD2;
  --indigo-2: #7C86E0;
  --indigo-deep: #3A45A8;
  --green: #22C55E;
  --red: #EF4444;
  --text: #F1F1F3;
  --text-dim: #8A8A93;
  --text-mute: #5A5A63;
  --hairline: rgba(255,255,255,0.06);
  --hairline-strong: rgba(255,255,255,0.10);

  --font-sans: 'Fira Sans', -apple-system, system-ui, sans-serif;
  --font-mono: 'JetBrains Mono', ui-monospace, monospace;
  --font-display: 'Calistoga', Georgia, serif;
}

* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }

body {
  font-family: var(--font-sans);
  color: var(--text);
  background: #1a1a1d;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* ---------- App scaffolding ---------- */
.capper-root {
  position: absolute;
  inset: 0;
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-sans);
  overflow: hidden;
}

/* aurora */
.aurora {
  position: absolute;
  inset: 0;
  pointer-events: none;
  z-index: 0;
  overflow: hidden;
}
.aurora::before {
  content: '';
  position: absolute;
  width: 520px; height: 520px;
  top: -180px; left: -120px;
  background: radial-gradient(circle, rgba(94,106,210,0.45) 0%, rgba(94,106,210,0) 60%);
  filter: blur(40px);
}
.aurora::after {
  content: '';
  position: absolute;
  width: 460px; height: 460px;
  bottom: 80px; right: -160px;
  background: radial-gradient(circle, rgba(124,134,224,0.32) 0%, rgba(94,106,210,0) 60%);
  filter: blur(50px);
}
.aurora .blob3 {
  position: absolute;
  width: 380px; height: 380px;
  top: 38%; left: 30%;
  background: radial-gradient(circle, rgba(58,69,168,0.25) 0%, rgba(58,69,168,0) 65%);
  filter: blur(60px);
}
.grain {
  position: absolute; inset: 0; pointer-events: none; z-index: 1;
  background-image: radial-gradient(rgba(255,255,255,0.012) 1px, transparent 1px);
  background-size: 3px 3px;
  opacity: 0.5;
}

/* ---------- Telegram chrome ---------- */
.tg-bar {
  position: absolute;
  top: 60px; left: 0; right: 0;
  height: 50px;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 14px;
  z-index: 30;
  font-size: 17px;
  color: var(--text);
  background: rgba(10,10,12,0.55);
  backdrop-filter: blur(20px) saturate(150%);
  -webkit-backdrop-filter: blur(20px) saturate(150%);
  border-bottom: 0.5px solid var(--hairline);
}
.model-switch {
  display: flex;
  gap: 2px;
  background: rgba(0,0,0,0.4);
  border-radius: 9999px;
  padding: 3px;
  border: 0.5px solid rgba(255,255,255,0.06);
}
.model-btn {
  border: 0;
  background: transparent;
  color: var(--text-dim);
  font-family: var(--font-mono);
  font-size: 10.5px;
  font-weight: 500;
  padding: 5px 10px;
  border-radius: 9999px;
  cursor: pointer;
  letter-spacing: 0.04em;
  transition: all 200ms ease;
  white-space: nowrap;
}
.model-btn.active {
  background: linear-gradient(180deg, rgba(94,106,210,0.32), rgba(94,106,210,0.15));
  color: var(--text);
  box-shadow:
    inset 0 0.5px 0 rgba(255,255,255,0.15),
    0 0 12px rgba(94,106,210,0.4);
}
.tg-bar .tg-close {
  font-family: var(--font-sans);
  font-size: 16px;
  color: var(--indigo-2);
  font-weight: 500;
}
.tg-bar .tg-title {
  display: flex; flex-direction: column; align-items: center; line-height: 1.1;
}
.tg-bar .tg-title strong {
  font-size: 15px; font-weight: 600; letter-spacing: 0.1px;
}
.tg-bar .tg-title small {
  font-size: 11px; color: var(--text-dim); margin-top: 2px;
  font-family: var(--font-mono);
}
.tg-bar .tg-more {
  width: 28px; height: 28px;
  display: flex; align-items: center; justify-content: center;
  border-radius: 8px;
}

/* ---------- Glass primitive ---------- */
.glass {
  background: rgba(17,17,20,0.55);
  backdrop-filter: blur(18px) saturate(160%);
  -webkit-backdrop-filter: blur(18px) saturate(160%);
  border: 0.5px solid var(--hairline-strong);
  box-shadow:
    inset 0 0.5px 0 rgba(255,255,255,0.06),
    0 1px 0 rgba(0,0,0,0.4);
}
.glass-strong {
  background: rgba(20,20,26,0.7);
  backdrop-filter: blur(24px) saturate(180%);
  -webkit-backdrop-filter: blur(24px) saturate(180%);
  border: 0.5px solid var(--hairline-strong);
}

/* ---------- Scroll area ---------- */
.scroll-area {
  position: absolute;
  top: 110px;            /* status (60) + tg-bar (50) */
  left: 0; right: 0;
  height: calc(100% - 110px);
  overflow-y: auto;
  padding: 16px 16px 140px;
  scroll-behavior: smooth;
}
.page-enter { position: absolute; inset: 0; }
.scroll-area::-webkit-scrollbar { width: 0; display: none; }

/* ---------- Bottom nav ---------- */
.bottom-nav {
  position: absolute;
  bottom: 22px; left: 16px; right: 16px;
  height: 64px;
  border-radius: 22px;
  display: flex;
  z-index: 40;
  padding: 6px;
  gap: 4px;
  background: rgba(10,10,14,0.65);
  backdrop-filter: blur(24px) saturate(180%);
  -webkit-backdrop-filter: blur(24px) saturate(180%);
  border: 0.5px solid var(--hairline-strong);
  box-shadow:
    inset 0 0.5px 0 rgba(255,255,255,0.08),
    0 12px 40px rgba(0,0,0,0.5),
    0 0 0 1px rgba(0,0,0,0.4);
}
.nav-item {
  flex: 1;
  border-radius: 16px;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 3px;
  cursor: pointer;
  color: var(--text-dim);
  transition: color 200ms ease, background 250ms ease, transform 200ms ease;
  position: relative;
  user-select: none;
}
.nav-item .nav-label {
  font-size: 10.5px;
  font-weight: 500;
  letter-spacing: 0.2px;
}
.nav-item.active {
  color: var(--text);
  background: linear-gradient(180deg, rgba(94,106,210,0.22), rgba(94,106,210,0.08));
  box-shadow:
    inset 0 0.5px 0 rgba(255,255,255,0.12),
    0 0 24px rgba(94,106,210,0.35),
    0 0 0 0.5px rgba(94,106,210,0.5);
}
.nav-item.active svg { color: var(--indigo-2); filter: drop-shadow(0 0 6px rgba(124,134,224,0.6)); }

/* ---------- Section heading ---------- */
.eyebrow {
  font-family: var(--font-mono);
  font-size: 10.5px;
  text-transform: uppercase;
  letter-spacing: 0.12em;
  color: var(--text-mute);
  margin-bottom: 8px;
}

/* ---------- Bankroll card ---------- */
.bankroll {
  position: relative;
  border-radius: 24px;
  padding: 18px 18px 14px;
  overflow: hidden;
}
.bankroll-row {
  display: flex; align-items: flex-start; justify-content: space-between;
  gap: 12px;
}
.bankroll-amount {
  font-family: var(--font-display);
  font-size: 36px;
  line-height: 1;
  letter-spacing: -0.5px;
  color: var(--text);
  display: flex; align-items: baseline; gap: 4px;
}
.bankroll-amount .currency {
  font-family: var(--font-mono);
  font-size: 16px;
  color: var(--text-dim);
  font-weight: 400;
  position: relative;
  top: -6px;
}
.bankroll-roi {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 4px 8px 4px 6px;
  border-radius: 8px;
  background: rgba(34,197,94,0.12);
  color: var(--green);
  font-family: var(--font-mono);
  font-size: 12px;
  font-weight: 500;
  border: 0.5px solid rgba(34,197,94,0.25);
}
.bankroll-meta {
  display: flex; flex-direction: column; align-items: flex-end; gap: 6px;
}
.bankroll-label {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--text-mute);
  text-transform: uppercase;
  letter-spacing: 0.12em;
}
.bankroll-spark {
  margin-top: 12px;
  height: 56px;
  position: relative;
}

/* ---------- Day picker ---------- */
.day-picker {
  display: flex;
  gap: 8px;
  overflow-x: auto;
  padding: 4px 0 6px;
  scrollbar-width: none;
}
.day-picker::-webkit-scrollbar { display: none; }
.day-chip {
  flex-shrink: 0;
  height: 36px;
  padding: 0 12px;
  border-radius: 9999px;
  display: flex; flex-direction: row; align-items: center; justify-content: center;
  gap: 6px;
  background: rgba(15,15,20,0.55);
  backdrop-filter: blur(14px) saturate(160%);
  -webkit-backdrop-filter: blur(14px) saturate(160%);
  border: 0.5px solid rgba(255,255,255,0.08);
  color: var(--text-dim);
  cursor: pointer;
  transition: all 250ms ease;
  position: relative;
}
.day-chip:hover { color: var(--text); }
.day-chip .dp-dow {
  font-size: 9.5px;
  font-family: var(--font-mono);
  text-transform: uppercase;
  letter-spacing: 0.1em;
  white-space: nowrap;
}
.day-chip.named { padding: 0 12px; }
.day-chip.named .dp-dow { font-size: 9px; letter-spacing: 0.12em; }
.day-chip .dp-num {
  font-size: 13px;
  font-weight: 600;
  font-family: var(--font-sans);
  color: var(--text);
}
.day-chip.active {
  color: var(--text);
  border-color: rgba(124,134,224,0.6);
  background:
    radial-gradient(120% 120% at 50% 0%, rgba(94,106,210,0.30) 0%, rgba(0,0,0,0.6) 70%),
    rgba(10,10,14,0.7);
  box-shadow:
    inset 0 0.5px 0 rgba(255,255,255,0.18),
    0 0 22px rgba(94,106,210,0.35);
}
.day-chip.active .dp-dow { color: var(--indigo-2); }
.day-chip .dp-dot {
  position: absolute;
  bottom: 4px;
  left: 50%;
  transform: translateX(-50%);
  width: 3px; height: 3px; border-radius: 50%;
  background: var(--indigo);
  box-shadow: 0 0 6px var(--indigo);
}

/* ---------- Match card ---------- */
.match-card {
  position: relative;
  border-radius: 20px;
  padding: 14px 16px 14px;
  display: flex;
  flex-direction: column;
  gap: 12px;
  cursor: pointer;
  transition: transform 200ms ease;
}
.match-card:active { transform: scale(0.99); }
.match-head {
  display: flex; align-items: center; justify-content: space-between;
  gap: 8px;
}
.match-meta {
  display: flex; align-items: center; gap: 8px;
  font-family: var(--font-mono);
  font-size: 10.5px;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 0.08em;
}
.match-meta .league { color: var(--text-mute); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 160px; }
.match-meta .dot { width: 3px; height: 3px; border-radius: 50%; background: var(--text-mute); }
.match-time {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--text-dim);
}
.live-pill {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 2px 8px 2px 7px;
  border-radius: 6px;
  background: rgba(239,68,68,0.12);
  border: 0.5px solid rgba(239,68,68,0.3);
  color: var(--red);
  font-size: 9.5px;
  font-family: var(--font-mono);
  font-weight: 600;
  letter-spacing: 0.1em;
}
.live-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--red);
  box-shadow: 0 0 8px var(--red);
  animation: livePulse 1.4s ease-in-out infinite;
}
@keyframes livePulse {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.4; transform: scale(0.7); }
}

.match-teams {
  display: grid;
  grid-template-columns: 1fr auto 1fr;
  align-items: center;
  gap: 12px;
}
.team {
  display: flex; align-items: center; gap: 9px;
  min-width: 0;
}
.team.away { justify-content: flex-end; flex-direction: row-reverse; }
.team-crest {
  width: 28px; height: 28px;
  border-radius: 50%;
  flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  font-family: var(--font-mono);
  font-size: 10px;
  font-weight: 700;
  color: rgba(255,255,255,0.9);
  border: 0.5px solid rgba(255,255,255,0.12);
}
.team-name {
  font-size: 14px;
  font-weight: 500;
  color: var(--text);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  min-width: 0;
}
.vs {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--text-mute);
  letter-spacing: 0.1em;
}
.score {
  font-family: var(--font-display);
  font-size: 22px;
  letter-spacing: 0.04em;
  color: var(--text);
  padding: 2px 10px;
  border-radius: 8px;
  background: rgba(239,68,68,0.10);
  border: 0.5px solid rgba(239,68,68,0.25);
  line-height: 1.1;
}

.pick-tag-wrap {
  display: flex; justify-content: center;
}
.pick-tag {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 6px 11px;
  border-radius: 9px;
  background: rgba(94,106,210,0.13);
  border: 0.5px solid rgba(94,106,210,0.32);
  color: var(--indigo-2);
  font-family: var(--font-mono);
  font-size: 11.5px;
  font-weight: 600;
  letter-spacing: 0.04em;
}
.pick-tag .odds {
  color: var(--text);
  font-weight: 600;
  padding-left: 7px;
  border-left: 0.5px solid rgba(94,106,210,0.32);
  margin-left: 2px;
}
.money-row {
  display: flex; align-items: center; justify-content: space-between;
  padding-top: 12px;
  border-top: 0.5px dashed rgba(255,255,255,0.08);
}
.money-side { display: flex; flex-direction: column; gap: 2px; }
.money-side.right { align-items: flex-end; }
.money-label {
  font-family: var(--font-mono);
  font-size: 9.5px;
  text-transform: uppercase;
  letter-spacing: 0.12em;
  color: var(--text-mute);
}
.money-value {
  font-family: var(--font-display);
  font-size: 18px;
  color: var(--text);
  letter-spacing: -0.2px;
  line-height: 1;
}
.money-value.win { color: var(--green); text-shadow: 0 0 10px rgba(34,197,94,0.3); }

/* ---------- Scroll-to-top ---------- */
.scroll-top {
  position: absolute;
  bottom: 100px;
  right: 16px;
  width: 44px; height: 44px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  background: rgba(20,20,26,0.7);
  backdrop-filter: blur(20px) saturate(180%);
  -webkit-backdrop-filter: blur(20px) saturate(180%);
  border: 0.5px solid rgba(124,134,224,0.4);
  color: var(--indigo-2);
  cursor: pointer;
  z-index: 35;
  box-shadow: 0 8px 24px rgba(0,0,0,0.5), 0 0 16px rgba(94,106,210,0.25);
  opacity: 0;
  transform: translateY(8px);
  pointer-events: none;
  transition: opacity 250ms ease, transform 250ms ease;
}
.scroll-top.visible { opacity: 1; transform: translateY(0); pointer-events: auto; }

/* ---------- Stats screen ---------- */
.stat-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}
.stat-card {
  border-radius: 16px;
  padding: 12px 14px;
  display: flex; flex-direction: column; gap: 4px;
}
.stat-value {
  font-family: var(--font-display);
  font-size: 24px;
  letter-spacing: -0.5px;
}
.stat-value.green { color: var(--green); }
.stat-value.indigo { color: var(--indigo-2); }
.stat-label {
  font-family: var(--font-mono);
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.12em;
  color: var(--text-mute);
}

.curve-card {
  border-radius: 22px;
  padding: 16px 14px 12px;
}
.curve-head {
  display: flex; align-items: flex-start; justify-content: space-between;
  margin-bottom: 4px;
}
.curve-title {
  font-size: 14px;
  font-weight: 500;
  color: var(--text);
}
.curve-period {
  display: flex; gap: 4px;
}
.period-chip {
  padding: 4px 8px;
  border-radius: 8px;
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--text-dim);
  cursor: pointer;
  transition: all 150ms ease;
}
.period-chip.active {
  background: rgba(94,106,210,0.18);
  color: var(--indigo-2);
}

.streak-card {
  border-radius: 22px;
  padding: 16px;
}
.streak-dots {
  display: flex; gap: 6px; margin-top: 12px;
  flex-wrap: nowrap;
}
.streak-dot {
  width: 14px; height: 14px;
  border-radius: 50%;
  flex-shrink: 0;
}
.streak-dot.W {
  background: radial-gradient(circle at 30% 30%, #4ADE80, var(--green));
  box-shadow: 0 0 8px rgba(34,197,94,0.7), inset 0 0 4px rgba(255,255,255,0.2);
}
.streak-dot.L {
  background: radial-gradient(circle at 30% 30%, #F87171, var(--red));
  box-shadow: 0 0 8px rgba(239,68,68,0.6), inset 0 0 4px rgba(255,255,255,0.15);
}
.streak-dot.P {
  background: rgba(255,255,255,0.1);
  border: 1px solid rgba(255,255,255,0.12);
}
.streak-legend {
  display: flex; align-items: center; gap: 8px;
  margin-top: 14px;
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--text-dim);
}
.legend-bar {
  flex: 1;
  height: 4px;
  border-radius: 2px;
  background: rgba(255,255,255,0.06);
  overflow: hidden;
  position: relative;
}
.legend-bar-fill {
  position: absolute; top: 0; left: 0; bottom: 0;
  background: linear-gradient(90deg, var(--indigo), var(--indigo-2));
  box-shadow: 0 0 8px rgba(94,106,210,0.5);
  border-radius: 2px;
}

/* ---------- Compare cards ---------- */
.model-card {
  border-radius: 18px;
  padding: 14px;
  display: flex; flex-direction: column;
  border-width: 0.5px;
  border-style: solid;
}
.model-card-head {
  display: flex; align-items: center; justify-content: space-between;
}
.model-dot {
  width: 10px; height: 10px; border-radius: 50%;
}
.model-stats {
  display: grid; grid-template-columns: 1fr 1fr 1fr;
  gap: 6px;
  padding-top: 10px;
  border-top: 0.5px dashed rgba(255,255,255,0.08);
}
.ms-cell {
  display: flex; flex-direction: column; gap: 3px;
  align-items: center;
}
.ms-val {
  font-family: var(--font-display);
  font-size: 17px;
  color: var(--text);
  letter-spacing: -0.2px;
  line-height: 1;
}
.ms-val.best {
  color: var(--green);
  text-shadow: 0 0 10px rgba(34,197,94,0.4);
}
.ms-lbl {
  font-family: var(--font-mono);
  font-size: 9px;
  color: var(--text-mute);
  text-transform: uppercase;
  letter-spacing: 0.12em;
}
.schedule-day {
  display: flex; flex-direction: column; gap: 8px;
}
.schedule-day-head {
  display: flex; align-items: baseline; justify-content: space-between;
  padding: 0 4px;
}
.schedule-date {
  display: flex; align-items: baseline; gap: 8px;
  white-space: nowrap;
}
.schedule-date .day-num {
  font-family: var(--font-display);
  font-size: 22px;
  color: var(--text);
}
.schedule-date .day-name {
  font-family: var(--font-mono);
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.12em;
  color: var(--text-dim);
}
.schedule-count {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--text-mute);
  text-transform: uppercase;
  letter-spacing: 0.1em;
}

/* ---------- Tweaks panel ---------- */
.tweaks-panel {
  position: absolute;
  bottom: 100px;
  left: 16px;
  right: 16px;
  z-index: 50;
  border-radius: 18px;
  padding: 14px;
  background: rgba(15,15,20,0.85);
  backdrop-filter: blur(28px) saturate(180%);
  -webkit-backdrop-filter: blur(28px) saturate(180%);
  border: 0.5px solid rgba(124,134,224,0.35);
  box-shadow: 0 24px 60px rgba(0,0,0,0.6), 0 0 30px rgba(94,106,210,0.2);
  display: flex; flex-direction: column; gap: 10px;
}
.tweaks-title {
  font-family: var(--font-mono);
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.15em;
  color: var(--text-dim);

// Crest — colored circle with team initials
function Crest({ code, size = 26 }) {
  const team = D.TEAMS[code] || { name: code, color: '#444' };
  const initials = team.name.split(' ').map(w => w[0]).join('').slice(0, 3).toUpperCase();
  return (

      width: size, height: size,
      background: `linear-gradient(135deg, ${team.color} 0%, ${shade(team.color, -25)} 100%)`,
    }}>{initials}</div>
  );
}
function shade(hex, pct) {
  const num = parseInt(hex.slice(1), 16);
  let r = (num >> 16) + pct;
  let g = ((num >> 8) & 0xff) + pct;
  let b = (num & 0xff) + pct;
  r = Math.max(0, Math.min(255, r));
  g = Math.max(0, Math.min(255, g));
  b = Math.max(0, Math.min(255, b));
  return '#' + ((r << 16) | (g << 8) | b).toString(16).padStart(6, '0');
}

// Sparkline
function Sparkline({ data, height = 56, gradient = true }) {
  const w = 320, h = height;
  const min = Math.min(...data);
  const max = Math.max(...data);
  const range = max - min || 1;
  const pts = data.map((v, i) => [
    (i / (data.length - 1)) * w,
    h - ((v - min) / range) * (h - 8) - 4,
  ]);
  const d = pts.map((p, i) => (i === 0 ? `M${p[0]},${p[1]}` : `L${p[0]},${p[1]}`)).join(' ');
  const area = d + ` L${w},${h} L0,${h} Z`;
  const last = pts[pts.length - 1];
  return (
    <svg className="spark-svg" viewBox={`0 0 ${w} ${h}`} preserveAspectRatio="none">
      <defs>
        <linearGradient id="sparkGrad" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stopColor="#7C86E0" stopOpacity="0.35"/>
          <stop offset="100%" stopColor="#7C86E0" stopOpacity="0"/>
        </linearGradient>
      </defs>
      {gradient && <path d={area} className="spark-area" />}
      <path d={d} className="spark-line" />
      <circle cx={last[0]} cy={last[1]} r="3" className="spark-end" />
    </svg>
  );
}

// Profit curve — bigger, with axis hints
function ProfitCurve({ data, height = 160 }) {
  const w = 360, h = height;
  const min = Math.min(0, ...data);
  const max = Math.max(...data);
  const range = max - min || 1;
  const pts = data.map((v, i) => [
    (i / (data.length - 1)) * w,
    h - ((v - min) / range) * (h - 24) - 12,
  ]);
  const d = pts.map((p, i) => (i === 0 ? `M${p[0]},${p[1]}` : `L${p[0]},${p[1]}`)).join(' ');
  const area = d + ` L${w},${h} L0,${h} Z`;
  const zeroY = h - ((0 - min) / range) * (h - 24) - 12;
  const last = pts[pts.length - 1];
  return (
    <svg viewBox={`0 0 ${w} ${h}`} style={{ width: '100%', height, display: 'block' }} preserveAspectRatio="none">
      <defs>
        <linearGradient id="curveGrad" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stopColor="#7C86E0" stopOpacity="0.40"/>
          <stop offset="100%" stopColor="#7C86E0" stopOpacity="0"/>
        </linearGradient>
        <filter id="curveGlow" x="-20%" y="-20%" width="140%" height="140%">
          <feGaussianBlur stdDeviation="2" result="b"/>
          <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
      </defs>
      {/* zero line */}
      <line x1="0" x2={w} y1={zeroY} y2={zeroY} stroke="rgba(255,255,255,0.06)" strokeDasharray="2 4"/>
      <path d={area} fill="url(#curveGrad)"/>
      <path d={d} fill="none" stroke="#7C86E0" strokeWidth="1.8" filter="url(#curveGlow)"
        strokeLinecap="round" strokeLinejoin="round"/>
      <circle cx={last[0]} cy={last[1]} r="3.5" fill="#7C86E0" filter="url(#curveGlow)"/>
    </svg>
  );
}

    </div>

}

function CombinedCurves({ models }) {
  const w = 360, h = 160;
  const allVals = models.flatMap(m => m.curve);
  const min = Math.min(0, ...allVals);
  const max = Math.max(...allVals);
  const range = max - min || 1;
  const len = models[0].curve.length;
  const zeroY = h - ((0 - min) / range) * (h - 24) - 12;

  return (
    <svg viewBox={`0 0 ${w} ${h}`} style={{ width: '100%', height: h, display: 'block' }} preserveAspectRatio="none">
      <defs>
        {models.map(m => (
          <linearGradient key={m.tag} id={`grad-${m.tag}`} x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stopColor={m.color} stopOpacity="0.22"/>
            <stop offset="100%" stopColor={m.color} stopOpacity="0"/>
          </linearGradient>
        ))}
      </defs>
      <line x1="0" x2={w} y1={zeroY} y2={zeroY} stroke="rgba(255,255,255,0.06)" strokeDasharray="2 4"/>
      {models.map(m => {
        const pts = m.curve.map((v, i) => [
          (i / (len - 1)) * w,
          h - ((v - min) / range) * (h - 24) - 12,
        ]);
        const d = pts.map((p, i) => (i === 0 ? `M${p[0]},${p[1]}` : `L${p[0]},${p[1]}`)).join(' ');
        const area = d + ` L${w},${h} L0,${h} Z`;
        const last = pts[pts.length - 1];
        return (
          <g key={m.tag}>
            <path d={area} fill={`url(#grad-${m.tag})`}/>
            <path d={d} fill="none" stroke={m.color} strokeWidth="1.8"
              strokeLinecap="round" strokeLinejoin="round"
              style={{ filter: `drop-shadow(0 0 4px ${m.color})` }}/>
            <circle cx={last[0]} cy={last[1]} r="3" fill={m.color}
              style={{ filter: `drop-shadow(0 0 6px ${m.color})` }}/>
          </g>
        );
      })}
    </svg>
  );
}

    function App() {
